name: CI — Lint · Type Check · Test · Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  WORKING_DIR:  ./frontend

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  quality:
    name: Code Quality (Lint + Types)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit & Integration Tests (Vitest)
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY:            test-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:        test.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID:         test-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:     test.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:"000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID:             1:000000000:web:000000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: frontend/coverage/

  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Production Build Verification
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      NEXT_PUBLIC_APP_URL:                     http://localhost:3000
      NEXT_PUBLIC_APP_NAME:                    "Concept Coaching Classes"
      NEXT_PUBLIC_FIREBASE_API_KEY:            test-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:        test.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID:         test-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:     test.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:"000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID:             1:000000000:web:000000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: frontend/.next/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      NEXT_PUBLIC_APP_URL:                     http://localhost:3000
      NEXT_PUBLIC_FIREBASE_API_KEY:            test-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:        test.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID:         test-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:     test.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:"000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID:             1:000000000:web:000000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
